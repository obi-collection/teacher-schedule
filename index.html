<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="時間割">
<meta name="theme-color" content="#f5f5f0">
<link rel="manifest" href="manifest.json">
<title>先生のスケジュール帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f0;
  --bg2: #ffffff;
  --bg3: #eeede8;
  --surface: #e8e7e2;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #1a1a1a;
  --text2: #555550;
  --text3: #999990;
  --accent: #5448e8;
  --accent2: #3d32c4;
  --accent-dim: rgba(84,72,232,0.10);
  --event: #d94f35;
  --event-dim: rgba(217,79,53,0.10);
  --task: #1a7fc4;
  --task-dim: rgba(26,127,196,0.10);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --header-h: 56px;
  --day-h: 48px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOP HEADER ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 12px;
}
.top-bar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.week-nav { display: flex; align-items: center; gap: 6px; }
.week-nav button {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text2);
  width: 32px; height: 32px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.week-nav button:active { background: var(--bg3); }
.week-label { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text2); white-space: nowrap; }
.today-btn {
  background: var(--accent-dim);
  border: 1px solid rgba(84,72,232,0.25);
  color: var(--accent);
  padding: 5px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.today-btn:active { background: rgba(84,72,232,0.18); }
.icon-btn {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text2);
  width: 36px; height: 36px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.icon-btn:active { background: var(--bg3); }

/* ── MAIN GRID ── */
.grid-wrapper { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

.day-header-row {
  display: flex; flex-shrink: 0;
  border-bottom: 1px solid var(--border2);
  overflow: hidden;
}
.time-gutter { width: 44px; flex-shrink: 0; border-right: 1px solid var(--border); }
.days-scroll-header { flex: 1; overflow: hidden; }
.days-header-inner { display: flex; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
.day-col-header {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: var(--day-h);
  gap: 2px;
  cursor: pointer;
  transition: background 0.15s;
  border-right: 1px solid var(--border);
  padding: 6px 4px;
}
.day-col-header:active { background: var(--bg3); }
.day-name { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; }
.day-num { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text2); line-height: 1; }
.day-col-header.today .day-num {
  color: #fff; background: var(--accent);
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.day-col-header.today .day-name { color: var(--accent); }
.day-col-header.sat .day-name,
.day-col-header.sat .day-num { color: #1a6fc4; }
.day-col-header.sat { background: rgba(26,111,196,0.05); }
.day-col-header.sun .day-name,
.day-col-header.sun .day-num { color: var(--event); }
.day-col-header.sun { background: rgba(217,79,53,0.05); }

/* Event banner row */
.event-banner-row { display: flex; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.event-gutter {
  width: 44px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.12s;
}
.event-gutter:active { background: var(--bg3); }
.event-gutter-icon { font-size: 11px; color: var(--text3); }
.days-scroll-events { flex: 1; overflow: hidden; }
.days-events-inner { display: flex; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
.day-events-cell {
  flex-shrink: 0;
  padding: 4px 3px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 2px;
  cursor: pointer; transition: background 0.12s; overflow: hidden;
}
.day-events-cell:active { background: var(--bg3); }
.event-chip { font-size: 9px; padding: 2px 5px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; pointer-events: none; }
.event-chip.gyoji   { background: var(--event-dim); color: var(--event); border-left: 2px solid var(--event); }
.event-chip.task    { background: var(--task-dim);  color: var(--task);  border-left: 2px solid var(--task); }
.event-chip.kōmu    { background: var(--accent-dim); color: var(--accent2); border-left: 2px solid var(--accent); }
.event-chip.holiday { background: var(--event-dim); color: var(--event); border-left: 2px solid var(--event); font-style: italic; }

/* Timetable */
.timetable-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.timetable-inner { display: flex; }
.period-labels { width: 44px; flex-shrink: 0; border-right: 1px solid var(--border); }
.period-label {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--border); gap: 1px;
}
.period-label.special { background: var(--bg3); border-top: 1px solid var(--border2); }
.period-num { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text3); text-align: center; line-height: 1.3; }
.period-time { font-size: 8px; color: var(--text3); opacity: 0.7; }

.days-scroll-body { flex: 1; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scroll-snap-type: x proximity; }
.days-body-inner { display: flex; height: 100%; }
.day-col-body { flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); scroll-snap-align: start; }
.day-col-body.sat-col     { background: rgba(26,111,196,0.04); }
.day-col-body.sun-col     { background: rgba(217,79,53,0.04); }
.day-col-body.holiday-col { background: rgba(217,79,53,0.04); }
.day-col-body.today-col   { background: rgba(240,180,0,0.07); }
.day-col-header.holiday .day-name,
.day-col-header.holiday .day-num { color: var(--event); }
.day-col-header.holiday { background: rgba(217,79,53,0.05); }
.day-col-header.today   { background: rgba(240,180,0,0.08); }

.period-cell {
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.12s;
  padding: 4px; overflow: hidden;
}
.period-cell:active { background: var(--bg3); }
.period-cell.filled { background: rgba(84,72,232,0.07); }
.period-cell.filled:active { background: rgba(84,72,232,0.14); }
.period-cell.special-cell { background: var(--bg3); border-top: 1px solid var(--border2); flex-direction: column; }
.period-cell.special-cell:active { background: var(--surface); }

.subject-label { font-size: 11px; font-weight: 500; color: var(--accent2); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
.empty-cell-icon { font-size: 14px; color: var(--text3); opacity: 0; transition: opacity 0.15s; }
.period-cell:active .empty-cell-icon { opacity: 0.5; }
.note-text { font-size: 10px; color: var(--text2); text-align: center; line-height: 1.3; word-break: break-all; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; padding: 0 2px; }
.note-empty-label { font-size: 9px; color: var(--text3); opacity: 0.45; }

.weekend-cell {
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.12s;
  padding: 8px 4px; overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.weekend-cell:active { background: rgba(0,0,0,0.06); }

/* Apply fixed timetable button */
.apply-btn {
  background: rgba(46,171,110,0.12);
  border: 1px solid rgba(46,171,110,0.3);
  color: #2eab6e;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 11px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.apply-btn:active { background: rgba(46,171,110,0.22); }

/* Fixed timetable grid in settings */
.fixed-grid { display: grid; gap: 3px; margin-top: 6px; }
.fixed-grid-header { text-align: center; font-size: 11px; color: var(--text3); padding: 3px 1px; font-weight: 500; }
.fixed-grid-period { display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.fixed-cell {
  height: 42px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 2px; transition: background 0.12s; overflow: hidden;
}
.fixed-cell:active { background: var(--bg3); }
.fixed-cell.has-entry { background: rgba(84,72,232,0.07); }
.fixed-cell-label { font-size: 10px; text-align: center; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; padding: 0 2px; }

/* ── BOTTOM NAV ── */
.bottom-nav { display: flex; background: var(--bg2); border-top: 1px solid var(--border2); padding-bottom: var(--safe-bottom); flex-shrink: 0; }
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 4px; cursor: pointer; gap: 3px;
  transition: background 0.15s; border: none; background: none; color: var(--text3);
}
.nav-item.active { color: var(--accent); }
.nav-item:active { background: var(--bg3); }
.nav-icon { font-size: 20px; }
.nav-label { font-size: 10px; letter-spacing: 0.03em; }

/* ── MODAL ── */
.modal-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: flex-end;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%; background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border2);
  padding: 12px 20px calc(var(--safe-bottom) + 20px);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  max-height: 85dvh; overflow-y: auto;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.modal-subtitle { font-size: 12px; color: var(--text3); margin-bottom: 16px; }

/* Genre / subject grids */
.genre-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.subject-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.subject-chip {
  padding: 10px 6px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  text-align: center;
  cursor: pointer;
  transition: all 0.12s;
}
.subject-chip:active { opacity: 0.7; }
.subject-chip.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

/* Genre chip (step 1) */
.genre-chip {
  padding: 12px 10px;
  border-radius: 12px;
  border: 2px solid transparent;
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  text-align: center;
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
}
.genre-chip:active { opacity: 0.7; }
.genre-chip-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Back button row */
.back-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.back-btn {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: background 0.12s;
}
.back-btn:active { background: var(--bg3); }
.step2-genre-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.subject-add-row { display: flex; gap: 8px; margin-bottom: 12px; }

.modal-actions { display: flex; gap: 10px; margin-top: 8px; }
.btn { flex: 1; padding: 13px; border-radius: 12px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
.btn:active { opacity: 0.7; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-danger { background: var(--event-dim); color: var(--event); border: 1px solid rgba(247,130,111,0.3); }
.btn-ghost { background: var(--surface); color: var(--text2); border: 1px solid var(--border2); }

/* ── SETTINGS / TODO PANEL ── */
.settings-panel {
  position: absolute; inset: 0;
  background: var(--bg);
  z-index: 200;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  padding-bottom: var(--safe-bottom);
}
.settings-panel.open { transform: translateX(0); }
.settings-header {
  display: flex; align-items: center; gap: 12px;
  padding: calc(var(--safe-top) + 12px) 16px 14px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg); z-index: 1;
}
.settings-header h2 { font-size: 17px; font-weight: 500; }
.settings-section { padding: 20px 16px 8px; }
.settings-section-title { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; background: var(--bg2); border-radius: 12px; margin-bottom: 6px; gap: 12px; }
.settings-row-label { font-size: 14px; color: var(--text); }
.settings-row-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.settings-input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 7px 10px; border-radius: 8px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; width: 80px; text-align: center; }
.toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track { position: absolute; inset: 0; background: var(--surface); border-radius: 13px; transition: background 0.2s; cursor: pointer; border: 1px solid var(--border2); }
.toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
.toggle-track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked + .toggle-track::after { transform: translateX(18px); }

/* Master list */
.master-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg2); border-radius: 10px; border: 1px solid var(--border); }
.master-item-name { flex: 1; font-size: 14px; color: var(--text); }
.master-item-del { color: var(--text3); font-size: 16px; cursor: pointer; padding: 4px; line-height: 1; background: none; border: none; }

.add-item-row { display: flex; gap: 8px; margin-top: 8px; }
.add-input { flex: 1; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); padding: 10px 12px; border-radius: 10px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; }
.add-input::placeholder { color: var(--text3); }
.add-btn { background: var(--accent-dim); border: 1px solid rgba(84,72,232,0.25); color: var(--accent); padding: 10px 16px; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }

/* Genre management in settings */
.genre-block { margin-bottom: 10px; }
.genre-block-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--bg2);
  border-radius: 10px 10px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
}
.genre-color-input {
  -webkit-appearance: none;
  width: 26px; height: 26px;
  border: 2px solid var(--border2);
  border-radius: 50%;
  cursor: pointer;
  padding: 0;
  overflow: hidden;
  flex-shrink: 0;
  background: none;
}
.genre-color-input::-webkit-color-swatch-wrapper { padding: 0; }
.genre-color-input::-webkit-color-swatch { border: none; border-radius: 50%; }
.genre-block-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
.genre-block-count { font-size: 11px; color: var(--text3); white-space: nowrap; }

.genre-items-panel {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 8px 14px 10px;
}
.genre-item-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.genre-item-row:last-of-type { border-bottom: none; }
.genre-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.genre-item-name { flex: 1; font-size: 13px; color: var(--text); }
.genre-item-del { color: var(--text3); font-size: 13px; cursor: pointer; background: none; border: none; padding: 4px; }
.genre-add-row { display: flex; gap: 6px; margin-top: 8px; }
.genre-add-input { flex: 1; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); padding: 8px 10px; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; }
.genre-add-input::placeholder { color: var(--text3); }
.genre-add-btn { background: var(--accent-dim); border: 1px solid rgba(84,72,232,0.25); color: var(--accent); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; }

/* Period settings */
.period-settings-list { display: flex; flex-direction: column; gap: 6px; }
.period-setting-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg2); border-radius: 10px; border: 1px solid var(--border); }
.period-setting-num { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text3); width: 24px; }
.time-input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 6px 8px; border-radius: 8px; font-size: 13px; font-family: 'DM Mono', monospace; width: 68px; text-align: center; }
.time-sep { color: var(--text3); font-size: 12px; }
.period-del-btn { margin-left: auto; color: var(--text3); font-size: 16px; cursor: pointer; background: none; border: none; padding: 4px; }

/* Data */
.data-actions { display: flex; flex-direction: column; gap: 8px; }
.data-btn { padding: 13px 16px; border-radius: 12px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--bg2); color: var(--text); text-align: left; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
.data-btn:active { background: var(--bg3); }
.data-btn-icon { font-size: 18px; }

/* Event modal */
.event-modal .modal-sheet { padding-bottom: calc(var(--safe-bottom) + 20px); }
.form-field { margin-bottom: 14px; }
.form-label { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 11px 12px; border-radius: 10px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; }
.form-input:focus { outline: none; border-color: var(--accent); }
.category-pills { display: flex; flex-wrap: wrap; gap: 7px; }
.category-pill { padding: 7px 14px; border-radius: 20px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); transition: all 0.12s; }
.category-pill.sel-gyoji { background: var(--event-dim); color: var(--event); border-color: rgba(217,79,53,0.35); }
.category-pill.sel-task  { background: var(--task-dim);  color: var(--task);  border-color: rgba(26,127,196,0.35); }
.category-pill.sel-kōmu  { background: var(--accent-dim); color: var(--accent); border-color: rgba(84,72,232,0.3); }

/* Toast */
.toast {
  position: absolute;
  bottom: calc(var(--safe-bottom) + 80px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1px solid var(--border2); color: var(--text);
  padding: 10px 18px; border-radius: 20px; font-size: 13px;
  white-space: nowrap; opacity: 0; transition: all 0.25s;
  pointer-events: none; z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Todo */
.todo-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg2); border-radius: 10px; border: 1px solid var(--border); }
.todo-check { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
.todo-text { flex: 1; font-size: 14px; color: var(--text); line-height: 1.4; }
.todo-text.done { text-decoration: line-through; color: var(--text3); }

#app { position: relative; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="week-nav">
        <button id="prevWeek">‹</button>
        <span class="week-label" id="weekLabel">--</span>
        <button id="nextWeek">›</button>
      </div>
      <button class="today-btn" id="todayBtn">今週に戻る</button>
      <button class="apply-btn" id="applyFixedBtn" title="固定時間割を適用">固定適用</button>
    </div>
    <button class="icon-btn" id="addEventBtn" title="予定追加">＋</button>
    <button class="icon-btn" id="openSettings" title="設定">⚙</button>
  </div>

  <!-- MAIN GRID -->
  <div class="grid-wrapper">
    <div class="day-header-row">
      <div class="time-gutter"></div>
      <div class="days-scroll-header" id="daysScrollHeader">
        <div class="days-header-inner" id="daysHeaderInner"></div>
      </div>
    </div>

    <div class="event-banner-row" id="eventBannerRow">
      <div class="event-gutter" id="eventGutter">
        <span class="event-gutter-icon">★</span>
      </div>
      <div class="days-scroll-events" id="daysScrollEvents">
        <div class="days-events-inner" id="daysEventsInner"></div>
      </div>
    </div>

    <div class="timetable-scroll" id="timetableScroll">
      <div class="timetable-inner">
        <div class="period-labels" id="periodLabels"></div>
        <div class="days-scroll-body" id="daysScrollBody">
          <div class="days-body-inner" id="daysBodyInner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-item active" id="navWeek">
      <span class="nav-icon">▦</span>
      <span class="nav-label">週</span>
    </button>
    <button class="nav-item" id="navTodo">
      <span class="nav-icon">☑</span>
      <span class="nav-label">To Do</span>
    </button>
    <button class="nav-item" id="navSettings2">
      <span class="nav-icon">⚙</span>
      <span class="nav-label">設定</span>
    </button>
  </div>

  <!-- SUBJECT SELECT MODAL (2-step) -->
  <div class="modal-overlay" id="subjectModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="subjectModalTitle">授業を選択</div>
      <div class="modal-subtitle" id="subjectModalSub"></div>

      <!-- Step 1: Genre selection -->
      <div id="genreStep">
        <div class="genre-grid" id="genreGrid"></div>
      </div>

      <!-- Step 2: Item selection -->
      <div id="itemStep" style="display:none">
        <div class="back-row">
          <button class="back-btn" id="backToGenreBtn">← 戻る</button>
          <span class="step2-genre-label" id="step2GenreLabel"></span>
        </div>
        <div class="subject-grid" id="itemGrid"></div>
        <!-- 新規追加（step2のみ） -->
        <div class="subject-add-row">
          <input class="add-input" id="subjectNewInput" placeholder="新しい項目名…" autocomplete="off">
          <button class="add-btn" id="subjectNewAddBtn">新規追加</button>
        </div>
      </div>

      <!-- 自由入力（常時表示） -->
      <div class="form-field">
        <label class="form-label">このコマのみ自由入力（マスターに追加しない）</label>
        <input class="form-input" id="subjectFreeText" placeholder="例：自習、補講、研修…" autocomplete="off">
      </div>

      <div class="modal-actions">
        <button class="btn btn-danger" id="clearCellBtn">削除</button>
        <button class="btn btn-ghost" id="cancelSubjectBtn">キャンセル</button>
        <button class="btn btn-primary" id="confirmSubjectBtn">確定</button>
      </div>
    </div>
  </div>

  <!-- EVENT ADD MODAL -->
  <div class="modal-overlay event-modal" id="eventModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">予定を追加</div>
      <br>
      <div class="form-field">
        <label class="form-label">タイトル</label>
        <input class="form-input" id="eventTitle" placeholder="例：運動会、採点締切…" autocomplete="off">
      </div>
      <div class="form-field">
        <label class="form-label">日付</label>
        <input class="form-input" type="date" id="eventDate">
      </div>
      <div class="form-field">
        <label class="form-label">種別</label>
        <div class="category-pills">
          <button class="category-pill sel-gyoji" data-cat="gyoji">行事</button>
          <button class="category-pill" data-cat="task">タスク・締切</button>
          <button class="category-pill" data-cat="kōmu">業務・校務</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelEventBtn">キャンセル</button>
        <button class="btn btn-primary" id="confirmEventBtn">追加</button>
      </div>
    </div>
  </div>

  <!-- NOTE MODAL (昼休み / 放課後 / 終日) -->
  <div class="modal-overlay" id="noteModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="noteModalTitle">昼休み</div>
      <div class="modal-subtitle" id="noteModalSub"></div>
      <div class="form-field">
        <textarea class="form-input" id="noteInput" rows="3" placeholder="メモを入力…" style="resize:none;min-height:80px"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="clearNoteBtn">クリア</button>
        <button class="btn btn-ghost" id="cancelNoteBtn">キャンセル</button>
        <button class="btn btn-primary" id="confirmNoteBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <button class="icon-btn" id="closeSettings">‹</button>
      <h2>設定</h2>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">表示</div>
      <div class="settings-row">
        <div><div class="settings-row-label">週の始まり</div></div>
        <select class="settings-input" id="weekStartSetting" style="width:auto;padding:7px 10px">
          <option value="1">月曜日</option>
          <option value="0">日曜日</option>
        </select>
      </div>
      <div class="settings-row">
        <div><div class="settings-row-label">土・日を表示</div></div>
        <label class="toggle">
          <input type="checkbox" id="showWeekendSetting">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="settings-row" id="weekendPeriodsRow">
        <div>
          <div class="settings-row-label">土・日にも時間割を表示</div>
          <div class="settings-row-sub">部活・補講など</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="weekendPeriodsSetting">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">時限設定</div>
      <div class="period-settings-list" id="periodSettingsList"></div>
      <div style="margin-top:8px">
        <button class="add-btn" id="addPeriodBtn" style="width:100%;text-align:center;padding:11px">＋ 時限を追加</button>
      </div>
    </div>

    <!-- ジャンル管理 -->
    <div class="settings-section">
      <div class="settings-section-title">ジャンル管理</div>
      <div id="genreMasterList"></div>
      <div class="add-item-row" style="margin-top:12px">
        <input class="add-input" id="newGenreInput" placeholder="ジャンル名を入力…">
        <button class="add-btn" id="addGenreBtn">追加</button>
      </div>
    </div>

    <!-- 固定時間割 -->
    <div class="settings-section">
      <div class="settings-section-title">固定時間割</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.5">毎週同じ予定をテンプレートとして登録。週ビューの「固定適用」ボタンで空きコマに一括入力されます。</div>
      <div id="fixedTimetableGrid"></div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">データ管理</div>
      <div class="data-actions">
        <button class="data-btn" id="exportBtn">
          <span class="data-btn-icon">↑</span>
          <span>データをエクスポート（バックアップ）</span>
        </button>
        <button class="data-btn" id="importBtn">
          <span class="data-btn-icon">↓</span>
          <span>データをインポート（復元）</span>
        </button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
    </div>
    <div style="height:40px"></div>
  </div>

  <!-- TODO PANEL -->
  <div class="settings-panel" id="todoPanel">
    <div class="settings-header">
      <button class="icon-btn" id="closeTodoPanel">‹</button>
      <h2>To Do リスト</h2>
    </div>
    <div class="settings-section">
      <div class="add-item-row" style="margin-top:0">
        <input class="add-input" id="newTodoInput" placeholder="タスクを追加…">
        <button class="add-btn" id="addTodoBtn">追加</button>
      </div>
      <div id="todoList" style="margin-top:12px;display:flex;flex-direction:column;gap:6px"></div>
    </div>
    <div style="height:40px"></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
// ══════════════════════════════════════════
// DEFAULTS
// ══════════════════════════════════════════

const DEFAULTS = {
  settings: {
    weekStart: 1,
    showWeekend: true,
    weekendPeriods: false,
    periods: [
      { start: '08:45', end: '09:35' },
      { start: '09:45', end: '10:35' },
      { start: '10:45', end: '11:35' },
      { start: '11:45', end: '12:35' },
      { start: '13:25', end: '14:15' },
      { start: '14:25', end: '15:15' },
    ],
    genres: [
      {
        name: '授業', color: '#5448e8',
        items: ['国語', '算数', '理科', '社会', '音楽', '図工', '体育', '英語', '道徳', '総合']
      },
      {
        name: '会議', color: '#1a7fc4',
        items: ['職員会議', '学年会', '研修会']
      },
      {
        name: 'その他', color: '#d94f35',
        items: []
      }
    ]
  },
  timetable: {},
  events: [],
  notes: {},
  todos: [],
  fixedTimetable: {}
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════

let state = {
  settings: JSON.parse(JSON.stringify(DEFAULTS.settings)),
  timetable: {},
  events: [],
  notes: {},
  todos: [],
  fixedTimetable: {},
  holidays: {},
  currentWeekStart: null,
  // Subject modal
  selectedCell: null,
  fixedCell: null,
  selectedGenreIdx: null,
  selectedSubject: null,
  // Event modal
  selectedEventCat: 'gyoji',
  // Note modal
  noteTarget: null
};

// ══════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════

function save() {
  try {
    localStorage.setItem('ts_settings',       JSON.stringify(state.settings));
    localStorage.setItem('ts_timetable',      JSON.stringify(state.timetable));
    localStorage.setItem('ts_events',         JSON.stringify(state.events));
    localStorage.setItem('ts_notes',          JSON.stringify(state.notes));
    localStorage.setItem('ts_todos',          JSON.stringify(state.todos));
    localStorage.setItem('ts_fixedTimetable', JSON.stringify(state.fixedTimetable));
  } catch(e) { showToast('保存に失敗しました'); }
}

function load() {
  try {
    const s  = localStorage.getItem('ts_settings');
    const t  = localStorage.getItem('ts_timetable');
    const e  = localStorage.getItem('ts_events');
    const n  = localStorage.getItem('ts_notes');
    const td = localStorage.getItem('ts_todos');
    const ft = localStorage.getItem('ts_fixedTimetable');
    if (s) {
      const parsed = JSON.parse(s);
      state.settings = { ...DEFAULTS.settings, ...parsed };
      if (!state.settings.genres) {
        state.settings.genres = JSON.parse(JSON.stringify(DEFAULTS.settings.genres));
      }
    }
    if (t)  state.timetable      = JSON.parse(t);
    if (e)  state.events         = JSON.parse(e);
    if (n)  state.notes          = JSON.parse(n);
    if (td) state.todos          = JSON.parse(td);
    if (ft) state.fixedTimetable = JSON.parse(ft);
  } catch(e) {}
}

// ══════════════════════════════════════════
// DATE UTILS
// ══════════════════════════════════════════

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const ws = state.settings.weekStart;
  const diff = (day - ws + 7) % 7;
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0);
  return d;
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function cellKey(dateStr, period) { return `${dateStr}_p${period}`; }

const DAY_NAMES = ['日','月','火','水','木','金','土'];

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════

function getDaysToShow() {
  const ws = state.currentWeekStart;
  const total = state.settings.showWeekend ? 7 : 5;
  return Array.from({length: total}, (_, i) => addDays(ws, i));
}

function getColWidth() {
  const days = getDaysToShow();
  const bodyW = document.getElementById('daysScrollBody').clientWidth || 320;
  const visibleDays = state.settings.showWeekend ? 5 : days.length;
  return Math.floor(bodyW / visibleDays);
}

function getPeriodHeight() {
  const scroll = document.getElementById('timetableScroll');
  const periods = state.settings.periods;
  const available = scroll.clientHeight || 400;
  return Math.max(40, Math.floor(available / (periods.length + 2)));
}

function render() {
  const ph = getPeriodHeight();
  document.getElementById('eventBannerRow').style.minHeight = ph + 'px';
  document.getElementById('daysScrollEvents').style.height  = ph + 'px';
  renderWeekLabel();
  renderHeaders();
  renderEventBanners();
  renderPeriodLabels();
  renderBody();
}

function renderWeekLabel() {
  const ws = state.currentWeekStart;
  const we = addDays(ws, 6);
  document.getElementById('weekLabel').textContent =
    `${ws.getMonth()+1}/${ws.getDate()} – ${we.getMonth()+1}/${we.getDate()}`;
}

function renderHeaders() {
  const days = getDaysToShow();
  const colW = getColWidth();
  const today = dateKey(new Date());
  const inner = document.getElementById('daysHeaderInner');
  inner.innerHTML = '';
  days.forEach(d => {
    const dk = dateKey(d);
    const dw = d.getDay();
    const el = document.createElement('div');
    el.className = 'day-col-header' +
      (dk === today ? ' today' : '') +
      (dw === 6 ? ' sat' : '') +
      (dw === 0 ? ' sun' : '') +
      (state.holidays[dk] && dw !== 0 ? ' holiday' : '');
    el.style.width = colW + 'px';
    el.innerHTML = `<span class="day-name">${DAY_NAMES[dw]}</span><span class="day-num">${d.getDate()}</span>`;
    inner.appendChild(el);
  });
}

function renderEventBanners() {
  const days = getDaysToShow();
  const colW = getColWidth();
  const ph   = getPeriodHeight();
  const inner = document.getElementById('daysEventsInner');
  inner.innerHTML = '';
  days.forEach(d => {
    const dk = dateKey(d);
    const cell = document.createElement('div');
    cell.className = 'day-events-cell';
    cell.style.width  = colW + 'px';
    cell.style.height = ph + 'px';
    // Holiday chip (auto, non-deletable)
    const holidayName = state.holidays[dk];
    if (holidayName) {
      const hChip = document.createElement('div');
      hChip.className = 'event-chip holiday';
      hChip.textContent = holidayName;
      hChip.title = holidayName;
      cell.appendChild(hChip);
    }
    // User events
    state.events.filter(e => e.date === dk).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = `event-chip ${ev.category}`;
      chip.textContent = ev.title;
      chip.title = ev.title;
      cell.appendChild(chip);
    });
    cell.addEventListener('click', () => openEventModal(dk));
    inner.appendChild(cell);
  });
}

function renderPeriodLabels() {
  const periods = state.settings.periods;
  const ph = getPeriodHeight();
  const labels = document.getElementById('periodLabels');
  labels.innerHTML = '';
  const lunchAfterIdx = Math.min(3, periods.length - 1);
  periods.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'period-label';
    el.style.height = ph + 'px';
    el.innerHTML = `<span class="period-num">${i+1}</span><span class="period-time">${p.start}</span>`;
    labels.appendChild(el);
    if (i === lunchAfterIdx) {
      const lunch = document.createElement('div');
      lunch.className = 'period-label special';
      lunch.style.height = ph + 'px';
      lunch.innerHTML = `<span class="period-num" style="font-size:9px">昼<br>休み</span>`;
      labels.appendChild(lunch);
    }
  });
  const after = document.createElement('div');
  after.className = 'period-label special';
  after.style.height = ph + 'px';
  after.innerHTML = `<span class="period-num" style="font-size:8px">放<br>課<br>後</span>`;
  labels.appendChild(after);
}

function renderBody() {
  const days = getDaysToShow();
  const periods = state.settings.periods;
  const colW = getColWidth();
  const ph   = getPeriodHeight();
  const inner = document.getElementById('daysBodyInner');
  inner.innerHTML = '';
  const lunchAfterIdx = Math.min(3, periods.length - 1);
  const todayKey = dateKey(new Date());

  days.forEach(d => {
    const dk = dateKey(d);
    const dw = d.getDay();
    const isWeekend = dw === 0 || dw === 6;
    const showPeriods = !isWeekend || state.settings.weekendPeriods;

    const col = document.createElement('div');
    col.className = 'day-col-body' +
      (dw === 6 ? ' sat-col' : dw === 0 ? ' sun-col' : '') +
      (state.holidays[dk] && dw !== 0 && dw !== 6 ? ' holiday-col' : '') +
      (dk === todayKey ? ' today-col' : '');
    col.style.width = colW + 'px';

    if (showPeriods) {
      periods.forEach((p, i) => {
        const key = cellKey(dk, i);
        const subjectData = state.timetable[key];
        const cell = document.createElement('div');
        cell.className = 'period-cell' + (subjectData ? ' filled' : '');
        cell.style.height = ph + 'px';

        if (subjectData) {
          const lbl = document.createElement('div');
          lbl.className = 'subject-label';
          lbl.textContent = subjectData.name;
          if (subjectData.color) {
            lbl.style.color = subjectData.color;
            cell.style.background = subjectData.color + '20';
          }
          cell.appendChild(lbl);
        } else {
          const icon = document.createElement('div');
          icon.className = 'empty-cell-icon';
          icon.textContent = '+';
          cell.appendChild(icon);
        }
        cell.addEventListener('click', () => openSubjectModal(dk, i));
        col.appendChild(cell);

        if (i === lunchAfterIdx) col.appendChild(makeSpecialCell(dk, 'lunch', ph));
      });
      col.appendChild(makeSpecialCell(dk, 'after', ph));
    } else {
      // Weekend: single tappable cell
      const noteKey = `${dk}_weekend`;
      const noteText = state.notes[noteKey] || '';
      const cell = document.createElement('div');
      cell.className = 'weekend-cell';
      cell.style.height = (ph * (periods.length + 2)) + 'px';
      if (noteText) {
        const txt = document.createElement('div');
        txt.className = 'note-text';
        txt.textContent = noteText;
        cell.appendChild(txt);
      }
      cell.addEventListener('click', () => openNoteModal(dk, 'weekend'));
      col.appendChild(cell);
    }
    inner.appendChild(col);
  });
}

function makeSpecialCell(dateStr, type, ph) {
  const key = `${dateStr}_${type}`;
  const noteText = state.notes[key] || '';
  const cell = document.createElement('div');
  cell.className = 'period-cell special-cell';
  cell.style.height = ph + 'px';
  if (noteText) {
    const txt = document.createElement('div');
    txt.className = 'note-text';
    txt.textContent = noteText;
    cell.appendChild(txt);
  } else {
    const lbl = document.createElement('div');
    lbl.className = 'note-empty-label';
    lbl.textContent = type === 'lunch' ? '昼休み' : '放課後';
    cell.appendChild(lbl);
  }
  cell.addEventListener('click', () => openNoteModal(dateStr, type));
  return cell;
}

function syncScroll() {
  const body   = document.getElementById('daysScrollBody');
  const header = document.getElementById('daysScrollHeader');
  const events = document.getElementById('daysScrollEvents');
  body.addEventListener('scroll', () => {
    header.scrollLeft = body.scrollLeft;
    events.scrollLeft = body.scrollLeft;
  });
}

// ══════════════════════════════════════════
// SUBJECT MODAL (2-step: genre → item)
// ══════════════════════════════════════════

function openSubjectModal(dateStr, periodIdx) {
  state.selectedCell    = { dateStr, periodIdx };
  state.selectedGenreIdx = null;
  state.selectedSubject  = null;

  const key = cellKey(dateStr, periodIdx);
  const existing = state.timetable[key];
  const freeInput = document.getElementById('subjectFreeText');
  freeInput.value = '';

  if (existing) {
    // Try to match to a genre item
    let matched = false;
    state.settings.genres.forEach((g, gi) => {
      if (!matched && g.items.includes(existing.name)) {
        state.selectedGenreIdx = gi;
        state.selectedSubject  = existing.name;
        matched = true;
      }
    });
    if (!matched) freeInput.value = existing.name;
  }

  document.getElementById('subjectNewInput').value = '';

  const p = state.settings.periods[periodIdx];
  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('subjectModalTitle').textContent =
    `${d.getMonth()+1}/${d.getDate()}（${DAY_NAMES[d.getDay()]}）`;
  document.getElementById('subjectModalSub').textContent =
    `${periodIdx+1}限 ${p.start}〜${p.end}`;

  renderModalStep();
  document.getElementById('subjectModal').classList.add('open');
}

function renderModalStep() {
  const showStep2 = state.selectedGenreIdx !== null;
  document.getElementById('genreStep').style.display = showStep2 ? 'none' : '';
  document.getElementById('itemStep').style.display  = showStep2 ? '' : 'none';
  if (showStep2) {
    renderItemGrid();
  } else {
    renderGenreGrid();
  }
}

function renderGenreGrid() {
  const grid = document.getElementById('genreGrid');
  grid.innerHTML = '';
  state.settings.genres.forEach((g, gi) => {
    const btn = document.createElement('button');
    btn.className = 'genre-chip';
    const dot = document.createElement('span');
    dot.className = 'genre-chip-dot';
    dot.style.background = g.color;
    const lbl = document.createElement('span');
    lbl.textContent = g.name;
    btn.appendChild(dot);
    btn.appendChild(lbl);
    btn.style.borderColor = g.color + '55';
    btn.addEventListener('click', () => {
      state.selectedGenreIdx = gi;
      state.selectedSubject  = null;
      renderModalStep();
    });
    grid.appendChild(btn);
  });
}

function renderItemGrid() {
  const genre = state.settings.genres[state.selectedGenreIdx];
  document.getElementById('step2GenreLabel').textContent = genre.name;
  document.getElementById('step2GenreLabel').style.color = genre.color;

  const grid = document.getElementById('itemGrid');
  grid.innerHTML = '';

  if (genre.items.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'grid-column:1/-1;text-align:center;color:var(--text3);font-size:12px;padding:10px 0 14px';
    empty.textContent = '項目がありません。下の入力欄から追加できます。';
    grid.appendChild(empty);
  }

  genre.items.forEach(item => {
    const btn = document.createElement('button');
    const isSelected = state.selectedSubject === item;
    btn.className = 'subject-chip' + (isSelected ? ' selected' : '');
    btn.textContent = item;
    if (isSelected) {
      btn.style.borderColor = genre.color;
      btn.style.background  = genre.color + '22';
      btn.style.color       = genre.color;
    }
    btn.addEventListener('click', () => {
      state.selectedSubject = item;
      document.getElementById('subjectFreeText').value = '';
      renderItemGrid();
    });
    grid.appendChild(btn);
  });
}

document.getElementById('backToGenreBtn').addEventListener('click', () => {
  state.selectedGenreIdx = null;
  state.selectedSubject  = null;
  renderModalStep();
});

// 新規追加（step2: ジャンルに項目を追加）
document.getElementById('subjectNewAddBtn').addEventListener('click', () => {
  if (state.selectedGenreIdx === null) return;
  const name = document.getElementById('subjectNewInput').value.trim();
  if (!name) return;
  const genre = state.settings.genres[state.selectedGenreIdx];
  if (genre.items.includes(name)) { showToast('すでに登録されています'); return; }
  genre.items.push(name);
  state.selectedSubject = name;
  document.getElementById('subjectNewInput').value = '';
  document.getElementById('subjectFreeText').value = '';
  save();
  renderItemGrid();
  showToast(`「${name}」を追加しました`);
});

document.getElementById('subjectNewInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('subjectNewAddBtn').click();
});

// 自由入力時は項目選択を解除
document.getElementById('subjectFreeText').addEventListener('input', function() {
  if (this.value) {
    state.selectedSubject = null;
    if (state.selectedGenreIdx !== null) renderItemGrid();
  }
});

document.getElementById('confirmSubjectBtn').addEventListener('click', () => {
  if (!state.selectedCell && !state.fixedCell) return;
  const freeText = document.getElementById('subjectFreeText').value.trim();

  let entry = null;
  if (freeText) {
    entry = { name: freeText, color: null };
  } else if (state.selectedSubject !== null && state.selectedGenreIdx !== null) {
    const genre = state.settings.genres[state.selectedGenreIdx];
    entry = { name: state.selectedSubject, color: genre.color };
  } else {
    showToast('ジャンル→項目を選択するか、自由入力してください');
    return;
  }

  if (state.fixedCell) {
    state.fixedTimetable[`${state.fixedCell.dow}_p${state.fixedCell.periodIdx}`] = entry;
    save(); renderFixedTimetableGrid(); closeSubjectModal();
  } else {
    state.timetable[cellKey(state.selectedCell.dateStr, state.selectedCell.periodIdx)] = entry;
    save(); render(); closeSubjectModal();
  }
});

document.getElementById('clearCellBtn').addEventListener('click', () => {
  if (state.fixedCell) {
    delete state.fixedTimetable[`${state.fixedCell.dow}_p${state.fixedCell.periodIdx}`];
    save(); renderFixedTimetableGrid(); closeSubjectModal();
  } else if (state.selectedCell) {
    delete state.timetable[cellKey(state.selectedCell.dateStr, state.selectedCell.periodIdx)];
    save(); render(); closeSubjectModal();
  }
});

document.getElementById('cancelSubjectBtn').addEventListener('click', closeSubjectModal);
document.getElementById('subjectModal').addEventListener('click', function(e) {
  if (e.target === this) closeSubjectModal();
});

function closeSubjectModal() {
  document.getElementById('subjectModal').classList.remove('open');
  document.getElementById('subjectFreeText').value = '';
  document.getElementById('subjectNewInput').value = '';
  state.selectedCell     = null;
  state.fixedCell        = null;
  state.selectedGenreIdx = null;
  state.selectedSubject  = null;
}

// NOTE MODAL
// ══════════════════════════════════════════

function openNoteModal(dateStr, type) {
  state.noteTarget = { dateStr, type };
  const key = `${dateStr}_${type}`;
  document.getElementById('noteInput').value = state.notes[key] || '';
  const d = new Date(dateStr + 'T00:00:00');
  const label = type === 'lunch' ? '昼休み' : type === 'after' ? '放課後' : '終日メモ';
  document.getElementById('noteModalTitle').textContent =
    `${d.getMonth()+1}/${d.getDate()}（${DAY_NAMES[d.getDay()]}） ${label}`;
  document.getElementById('noteModalSub').textContent = 'メモを自由に入力できます';
  document.getElementById('noteModal').classList.add('open');
  setTimeout(() => document.getElementById('noteInput').focus(), 300);
}

function closeNoteModal() {
  document.getElementById('noteModal').classList.remove('open');
  state.noteTarget = null;
}

document.getElementById('confirmNoteBtn').addEventListener('click', () => {
  if (!state.noteTarget) return;
  const key = `${state.noteTarget.dateStr}_${state.noteTarget.type}`;
  const text = document.getElementById('noteInput').value.trim();
  if (text) { state.notes[key] = text; } else { delete state.notes[key]; }
  save(); render(); closeNoteModal();
});

document.getElementById('clearNoteBtn').addEventListener('click', () => {
  if (!state.noteTarget) return;
  delete state.notes[`${state.noteTarget.dateStr}_${state.noteTarget.type}`];
  save(); render(); closeNoteModal();
});

document.getElementById('cancelNoteBtn').addEventListener('click', closeNoteModal);
document.getElementById('noteModal').addEventListener('click', function(e) {
  if (e.target === this) closeNoteModal();
});

document.getElementById('addEventBtn').addEventListener('click', () => openEventModal(dateKey(new Date())));

});

function updateCategoryPills() {

    btn.className = 'category-pill' + (btn.dataset.cat === state.selectedEventCat ? ` sel-${btn.dataset.cat}` : '');

document.getElementById('confirmEventBtn').addEventListener('click', () => {

  const date  = document.getElementById('eventDate').value;
  if (!title || !date) { showToast('タイトルと日付を入力してください'); return; }

  save(); render();
  document.getElementById('eventModal').classList.remove('open');
  showToast('予定を追加しました');
});

document.getElementById('cancelEventBtn').addEventListener('click', () => {
  document.getElementById('eventModal').classList.remove('open');
});

function openSettings() { renderSettings(); document.getElementById('settingsPanel').classList.add('open'); }
function closeSettingsPanel() { document.getElementById('settingsPanel').classList.remove('open'); }

document.getElementById('openSettings').addEventListener('click', openSettings);
document.getElementById('navSettings2').addEventListener('click', openSettings);
document.getElementById('closeSettings').addEventListener('click', closeSettingsPanel);

function renderSettings() {
  document.getElementById('weekStartSetting').value = state.settings.weekStart;
  const sw = document.getElementById('showWeekendSetting');
  sw.checked = state.settings.showWeekend;
  document.getElementById('weekendPeriodsRow').style.display = state.settings.showWeekend ? '' : 'none';
  document.getElementById('weekendPeriodsSetting').checked = state.settings.weekendPeriods;
  renderPeriodSettingsList();
  renderGenreMasterList();
  renderFixedTimetableGrid();
}

document.getElementById('weekStartSetting').addEventListener('change', function() {
  state.settings.weekStart = parseInt(this.value);
  state.currentWeekStart = getWeekStart(new Date());
  save(); render();
});
document.getElementById('showWeekendSetting').addEventListener('change', function() {
  state.settings.showWeekend = this.checked;
  document.getElementById('weekendPeriodsRow').style.display = this.checked ? '' : 'none';
  save(); render();
});
document.getElementById('weekendPeriodsSetting').addEventListener('change', function() {
  state.settings.weekendPeriods = this.checked;
  save(); render();
});

function renderPeriodSettingsList() {
  const list = document.getElementById('periodSettingsList');
  list.innerHTML = '';
  state.settings.periods.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'period-setting-row';
    row.innerHTML = `
      <span class="period-setting-num">${i+1}</span>
      <input class="time-input" type="time" value="${p.start}" data-idx="${i}" data-field="start">
      <span class="time-sep">〜</span>
      <input class="time-input" type="time" value="${p.end}" data-idx="${i}" data-field="end">
      <button class="period-del-btn" data-idx="${i}">✕</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('.time-input').forEach(inp => {
    inp.addEventListener('change', function() {
      state.settings.periods[parseInt(this.dataset.idx)][this.dataset.field] = this.value;
      save(); render();
    });
  });
  list.querySelectorAll('.period-del-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const idx = parseInt(this.dataset.idx);
      if (state.settings.periods.length <= 1) return;
      state.settings.periods.splice(idx, 1);
      save(); render(); renderPeriodSettingsList();
    });
  });
}

document.getElementById('addPeriodBtn').addEventListener('click', () => {
  const last = state.settings.periods[state.settings.periods.length - 1];
  state.settings.periods.push({ start: last?.end || '16:00', end: '16:50' });
  save(); render(); renderPeriodSettingsList();
});

// ── Genre master list ──

const GENRE_COLORS = ['#5448e8','#1a7fc4','#d94f35','#2eab6e','#e8a020','#9b59b6','#e84891','#20b2aa'];
let colorIdx = 0;

function renderGenreMasterList() {
  const container = document.getElementById('genreMasterList');
  container.innerHTML = '';

  state.settings.genres.forEach((g, gi) => {
    const block = document.createElement('div');
    block.className = 'genre-block';

    // Header
    const header = document.createElement('div');
    header.className = 'genre-block-header';

    const colorPicker = document.createElement('input');
    colorPicker.type = 'color';
    colorPicker.className = 'genre-color-input';
    colorPicker.value = g.color;
    colorPicker.title = '色を変更';
    colorPicker.addEventListener('change', function() {
      state.settings.genres[gi].color = this.value;
      save(); renderGenreMasterList();
    });

    const nameLbl = document.createElement('span');
    nameLbl.className = 'genre-block-name';
    nameLbl.textContent = g.name;

    const countLbl = document.createElement('span');
    countLbl.className = 'genre-block-count';
    countLbl.textContent = `${g.items.length}項目`;

    const delBtn = document.createElement('button');
    delBtn.className = 'master-item-del';
    delBtn.textContent = '✕';
    delBtn.title = 'ジャンルを削除';
    delBtn.addEventListener('click', () => {
      if (!confirm(`「${g.name}」を削除しますか？`)) return;
      state.settings.genres.splice(gi, 1);
      save(); renderGenreMasterList();
    });

    header.appendChild(colorPicker);
    header.appendChild(nameLbl);
    header.appendChild(countLbl);
    header.appendChild(delBtn);
    block.appendChild(header);

    // Items panel
    const panel = document.createElement('div');
    panel.className = 'genre-items-panel';

    g.items.forEach((item, ii) => {
      const row = document.createElement('div');
      row.className = 'genre-item-row';

      const dot = document.createElement('span');
      dot.className = 'genre-item-dot';
      dot.style.background = g.color;

      const txt = document.createElement('span');
      txt.className = 'genre-item-name';
      txt.textContent = item;

      const del = document.createElement('button');
      del.className = 'genre-item-del';
      del.textContent = '✕';
      del.addEventListener('click', () => {
        state.settings.genres[gi].items.splice(ii, 1);
        save(); renderGenreMasterList();
      });

      row.appendChild(dot);
      row.appendChild(txt);
      row.appendChild(del);
      panel.appendChild(row);
    });

    // Add item row
    const addRow = document.createElement('div');
    addRow.className = 'genre-add-row';

    const addInput = document.createElement('input');
    addInput.className = 'genre-add-input';
    addInput.placeholder = '項目を追加…';

    const addBtn = document.createElement('button');
    addBtn.className = 'genre-add-btn';
    addBtn.textContent = '追加';
    addBtn.addEventListener('click', () => {
      const name = addInput.value.trim();
      if (!name) return;
      if (state.settings.genres[gi].items.includes(name)) { showToast('すでに登録されています'); return; }
      state.settings.genres[gi].items.push(name);
      addInput.value = '';
      save(); renderGenreMasterList();
    });
    addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });

    addRow.appendChild(addInput);
    addRow.appendChild(addBtn);
    panel.appendChild(addRow);

    block.appendChild(panel);
    container.appendChild(block);
  });
}

document.getElementById('addGenreBtn').addEventListener('click', () => {
  const name = document.getElementById('newGenreInput').value.trim();
  if (!name) return;
  const color = GENRE_COLORS[colorIdx % GENRE_COLORS.length];
  colorIdx++;
  state.settings.genres.push({ name, color, items: [] });
  document.getElementById('newGenreInput').value = '';
  save(); renderGenreMasterList();
});

document.getElementById('newGenreInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('addGenreBtn').click();
});

// ══════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════

document.getElementById('exportBtn').addEventListener('click', () => {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    settings: state.settings,
    timetable: state.timetable,
    events: state.events,
    notes: state.notes,
    todos: state.todos,
    fixedTimetable: state.fixedTimetable
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `schedule-backup-${dateKey(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('バックアップを保存しました');
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.settings)  state.settings  = data.settings;
      if (data.timetable) state.timetable  = data.timetable;
      if (data.events)    state.events     = data.events;
      if (data.notes)          state.notes          = data.notes;
      if (data.todos)          state.todos          = data.todos;
      if (data.fixedTimetable) state.fixedTimetable = data.fixedTimetable;
      // Ensure genres exists after import
      if (!state.settings.genres) {
        state.settings.genres = JSON.parse(JSON.stringify(DEFAULTS.settings.genres));
      }
      save(); render(); renderSettings();
      showToast('データを復元しました');
    } catch(err) {
      showToast('ファイルの読み込みに失敗しました');
    }
  };
  reader.readAsText(file);
  this.value = '';
});

function openTodoPanel() {
  renderTodoList();
  document.getElementById('todoPanel').classList.add('open');
  document.getElementById('navTodo').classList.add('active');
  document.getElementById('navWeek').classList.remove('active');

function closeTodoPanel() {
  document.getElementById('todoPanel').classList.remove('open');
  document.getElementById('navTodo').classList.remove('active');
  document.getElementById('navWeek').classList.add('active');
}

document.getElementById('navTodo').addEventListener('click', openTodoPanel);
document.getElementById('closeTodoPanel').addEventListener('click', closeTodoPanel);

function renderTodoList() {
  const list = document.getElementById('todoList');
  list.innerHTML = '';
  if (state.todos.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;color:var(--text3);font-size:13px;padding:24px 0';
    empty.textContent = 'タスクはありません';
    list.appendChild(empty);
    return;
  }
  state.todos.forEach((todo, i) => {
    const item = document.createElement('div');
    item.className = 'todo-item';
    item.style.opacity = todo.done ? '0.55' : '1';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'todo-check';
    cb.checked = todo.done;
    cb.dataset.idx = i;
    cb.addEventListener('change', function() {
      state.todos[parseInt(this.dataset.idx)].done = this.checked;
      save(); renderTodoList();
    });

    const txt = document.createElement('span');
    txt.className = 'todo-text' + (todo.done ? ' done' : '');
    txt.textContent = todo.text;

    const del = document.createElement('button');
    del.className = 'master-item-del';
    del.textContent = '✕';
    del.dataset.idx = i;
    del.addEventListener('click', function() {
      state.todos.splice(parseInt(this.dataset.idx), 1);
      save(); renderTodoList();
    });

    item.appendChild(cb); item.appendChild(txt); item.appendChild(del);
    list.appendChild(item);
  });
}

document.getElementById('addTodoBtn').addEventListener('click', () => {
  const input = document.getElementById('newTodoInput');
  const text = input.value.trim();
  if (!text) return;
  state.todos.push({ text, done: false });
  input.value = '';
  save(); renderTodoList();
});

document.getElementById('newTodoInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('addTodoBtn').click();
});

// ══════════════════════════════════════════
// FIXED TIMETABLE
// ══════════════════════════════════════════

function openFixedModal(dow, periodIdx) {
  state.fixedCell        = { dow, periodIdx };
  state.selectedCell     = null;
  state.selectedGenreIdx = null;
  state.selectedSubject  = null;

  const key = `${dow}_p${periodIdx}`;
  const existing = state.fixedTimetable[key];
  const freeInput = document.getElementById('subjectFreeText');
  freeInput.value = '';

  if (existing) {
    let matched = false;
    state.settings.genres.forEach((g, gi) => {
      if (!matched && g.items.includes(existing.name)) {
        state.selectedGenreIdx = gi;
        state.selectedSubject  = existing.name;
        matched = true;
      }
    });
    if (!matched) freeInput.value = existing.name;
  }

  document.getElementById('subjectNewInput').value = '';
  const p = state.settings.periods[periodIdx];
  document.getElementById('subjectModalTitle').textContent = `固定時間割 ${DAY_NAMES[dow]}曜日`;
  document.getElementById('subjectModalSub').textContent   = `${periodIdx+1}限 ${p.start}〜${p.end}`;

  renderModalStep();
  document.getElementById('subjectModal').classList.add('open');
}

function renderFixedTimetableGrid() {
  const container = document.getElementById('fixedTimetableGrid');
  if (!container) return;
  container.innerHTML = '';

  const dows      = [1, 2, 3, 4, 5];
  const dayLabels = ['月', '火', '水', '木', '金'];
  const periods   = state.settings.periods;

  const grid = document.createElement('div');
  grid.className = 'fixed-grid';
  grid.style.gridTemplateColumns = `24px repeat(5, 1fr)`;

  // Header row
  grid.appendChild(document.createElement('div'));
  dayLabels.forEach(d => {
    const h = document.createElement('div');
    h.className = 'fixed-grid-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  // Period rows
  periods.forEach((p, pi) => {
    const lbl = document.createElement('div');
    lbl.className = 'fixed-grid-period';
    lbl.textContent = pi + 1;
    grid.appendChild(lbl);

    dows.forEach(dow => {
      const key   = `${dow}_p${pi}`;
      const entry = state.fixedTimetable[key];
      const cell  = document.createElement('div');
      cell.className = 'fixed-cell' + (entry ? ' has-entry' : '');
      if (entry && entry.color) cell.style.background = entry.color + '20';

      if (entry) {
        const lbl2 = document.createElement('div');
        lbl2.className = 'fixed-cell-label';
        lbl2.style.color = entry.color || 'var(--text2)';
        lbl2.textContent = entry.name;
        cell.appendChild(lbl2);
      }

      cell.addEventListener('click', () => openFixedModal(dow, pi));
      grid.appendChild(cell);
    });
  });

  container.appendChild(grid);
}

function applyFixedTimetable() {
  const days = getDaysToShow();
  let applied = 0;

  days.forEach(d => {
    const dk = dateKey(d);
    const dw = d.getDay();
    // Skip holidays (no classes on holidays)
    if (state.holidays[dk]) return;
    state.settings.periods.forEach((p, i) => {
      const fixedKey = `${dw}_p${i}`;
      const cellK    = cellKey(dk, i);
      if (state.fixedTimetable[fixedKey] && !state.timetable[cellK]) {
        state.timetable[cellK] = { ...state.fixedTimetable[fixedKey] };
        applied++;
      }
    });
  });

  if (applied > 0) {
    save(); render();
    showToast(`${applied}コマに固定時間割を適用しました`);
  } else {
    showToast('適用できる空きコマがありません');
  }
}

document.getElementById('applyFixedBtn').addEventListener('click', applyFixedTimetable);

});

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════
// HOLIDAYS
// ══════════════════════════════════════════

async function loadHolidays() {
  const CACHE_KEY = 'ts_holidays';
  const CACHE_TTL = 30 * 24 * 60 * 60 * 1000; // 30 days

  function applyHolidays(data) {
    state.holidays = data;
    render();
  }

  // Check cache validity
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const { data, cachedAt } = JSON.parse(raw);
      if (Date.now() - cachedAt < CACHE_TTL) {
        applyHolidays(data);
        return;
      }
    }
  } catch(e) {}

  // Fetch fresh data
  try {
    const res = await fetch('https://holidays-jp.github.io/api/v1/date.json');
    if (res.ok) {
      const data = await res.json();
      localStorage.setItem(CACHE_KEY, JSON.stringify({ data, cachedAt: Date.now() }));
      applyHolidays(data);
    }
  } catch(e) {
    // Offline fallback: use expired cache if available
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) applyHolidays(JSON.parse(raw).data);
    } catch(e2) {}
  }
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════

load();
state.currentWeekStart = getWeekStart(new Date());
syncScroll();
render();
loadHolidays();

window.addEventListener('resize', () => render());
